<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <!-- <link rel="stylesheet" href="style.css"> -->
    </head>
    <body>
          
  {% with messages = get_flashed_messages(with_categories=true) %}
   {% if messages %}
    {% for category, message in messages %}

      {% if category == 'error' %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button"
                  class="btn-close"
                  data-bs-dismiss="alert"
                  aria-label="Close"></button>
        </div>
      {% else %}
        <div class="alert alert-success alert-dismissible fade show" role="success">
          {{ message }}
          <button type="button"
                  class="btn-close"
                  data-bs-dismiss="alert"
                  aria-label="Close"></button>
        </div>
      {% endif %}

    {% endfor %}
   {% endif %}
  {% endwith %}    
        <div id="container">
            <div id="formulario">
                <form action="/forgot" method="post" id="forgot">
                    <h2>Insira seu CPF</h2>
                    <div class="caixa-input">
                        <input type="text" id="cpf" name="cpf" minlength="10" required><br>
                        <label for="nome">CPF</label><br>
                    </div>
                    <button type="submit" id="btn_login">Esqueci senha</button>
                </form>
            </div>
        </div>
  
        <script src="static/script.js"></script>
    </body>
</html>
