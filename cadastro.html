<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mania Doce | Cadastro</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="container">
            <header>
                <div class="logo">
                    <img class="logo-header" src="logo-maniadoce.png" alt="logo">
                </div>
                <div id="header-box">
                    <div class="input-box">
                        <div class="input-group">
                            <div class="input-icon">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </div>
                            <input type="text" id="search" class="input-field" placeholder="Pesquisar">
                        </div>
                    </div>
                    <div class="buttons">
                        <button><a class="link-button" href="login-senha.html">Entrar</a></button>
                    </div>
                </div>
            </header>
            <div class="menu">
                <nav>
                    <ul>
                        <div class="menu-pages"><li><a href="#destaques">Destaques</a></li></div>
                        <div class="menu-pages"><li><a href="#sobre-nos">Sobre Nós</a></li></div>
                        <div class="menu-pages"><li><a href="#avaliacoes">Avaliações</a></li></div>
                        <div class="menu-pages"><li><a href="produtos.html">Produtos</a></li></div>  
                    </ul>
                </nav>
            </div>
            <main id="signup-main">
                <div class="signup-box">
                    <form action="inicio.html" method="post" id="signup-form">
                        <h2 class="signup-title">Cadastre-se</h2>
                        <div class="signup-input-box">
                            <input type="text" id="name" name="name" required>
                            <label for="name">Nome Completo</label>
                        </div>
                        <div class="signup-input-box">
                            <input type="number" id="cpf" name="cpf" required>
                            <label for="cpf">CPF</label>
                        </div>
                        <div class="signup-input-box">
                            <input type="email" id="email" name="email" required>
                            <label for="email">Email</label>
                        </div>
                        <div class="signup-input-box">
                            <input type="tel" id="tel" name="tel" required>
                            <label for="tel">Telefone</label>
                        </div>
                        <div class="signup-input-box">
                            <input type="text" id="date" name="date" required>
                            <label for="date">Data de Nascimento</label>
                        </div>
                        <div class="signup-input-box">
                            <input type="password" id="password" name="password" required>
                            <label for="password">Senha</label>
                        </div>
                        <button type="submit" id="signup-button">Cadastrar</button>
                    </form>
                </div>
            </main>
            <footer>
                <div class="logo">
                    <img class="logo-footer" src="logo-maniadoce.png" alt="logo">
                </div>
                <div class="footer-boxes">
                    <div id="footer-box1">
                        (11) 34567-4567 (11) 72935-4265
                    </div>
                    <div id="footer-box2">
                        Rua das Margaridas Douradas, 345 Vila Doce - São Paulo, SP
                    </div>
                    <div id="footer-box3">
                        <a href="https://www.instagram.com/"><img class="social-media" src="insta.png" alt="instagram-logo"></a>
                        <a href="https://www.facebook.com/?locale=pt_BR"><img class="social-media" src="face.png" alt="facebook-logo"></a>
                    </div>
                </div>
            </footer>
        </div>
        <script src="script.js"></script>
    </body>
</html>
